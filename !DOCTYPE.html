<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fleet Check-in</title>
    <style>
        body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: #f0f2f5; margin: 0; padding: 10px; }
        .container { text-align: center; background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; position: relative; box-sizing: border-box; }
        .lang-btn { position: absolute; top: 15px; right: 15px; padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 50px; font-weight: bold; font-size: 0.75rem; }
        h2 { color: #1c1e21; margin-top: 10px; font-size: 1.5rem; }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        #num-disp { font-size: clamp(4rem, 15vw, 6rem); font-weight: 800; color: #007bff; margin: 10px 0; }
        #main-btn { width: 100%; padding: 18px; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #status { margin-top: 20px; font-weight: bold; min-height: 1.5em; }
        .reset-link { margin-top: 40px; font-size: 0.8rem; color: #bdc3c7; cursor: pointer; display: inline-block; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <button class="lang-btn" onclick="toggle()" id="L-BTN">FRANÇAIS</button>
    <h2 id="T">Driver Arrival</h2>
    <input type="text" id="ID-IN" placeholder="Driver ID">
    <input type="text" id="CAR-IN" placeholder="Car Model">
    <div id="num-disp">--</div>
    <button id="main-btn" onclick="go()">Get Number</button>
    <div id="status"></div>
    <span class="reset-link" onclick="resetQ()" id="R-TXT">Admin Reset</span>
</div>

<script>
    // --- WEBHOOK URL CONFIGURED ---
    const WEBHOOK = "https://hook.us2.make.com/8ihnw5u8h803nvoqrp5oyg3mk28c9xqs"; 
    
    const PIN = "112233";
    let lang = 'en';
    const words = {
        en: { t: "Driver Arrival", id: "Driver ID", car: "Car Model", b: "Get Number", r: "Admin Reset", l: "FRANÇAIS", s: "Success!" },
        fr: { t: "Arrivée du Chauffeur", id: "ID du Chauffeur", car: "Modèle de voiture", b: "Obtenir un numéro", r: "Réinitialisation", l: "ENGLISH", s: "Succès!" }
    };

    function toggle() {
        lang = (lang === 'en') ? 'fr' : 'en';
        const w = words[lang];
        document.getElementById('T').innerText = w.t;
        document.getElementById('ID-IN').placeholder = w.id;
        document.getElementById('CAR-IN').placeholder = w.car;
        document.getElementById('main-btn').innerText = w.b;
        document.getElementById('R-TXT').innerText = w.r;
        document.getElementById('L-BTN').innerText = w.l;
        document.getElementById('status').innerText = "";
    }

    function go() {
        const idVal = document.getElementById('ID-IN').value.trim();
        const carVal = document.getElementById('CAR-IN').value.trim();
        const disp = document.getElementById('num-disp');
        const stat = document.getElementById('status');

        if (!idVal || !carVal) {
            stat.innerText = (lang === 'en') ? "Fill all fields" : "Remplissez tout";
            stat.style.color = "red";
            return;
        }

        let used = JSON.parse(localStorage.getItem('uIDs')) || {};
        if (used[idVal]) {
            stat.innerText = (lang === 'en') ? "Already used" : "Déjà utilisé";
            stat.style.color = "red";
            disp.innerText = used[idVal];
            return;
        }

        let count = parseInt(localStorage.getItem('gCount')) || 0;
        count++;

        used[idVal] = count;
        localStorage.setItem('uIDs', JSON.stringify(used));
        localStorage.setItem('gCount', count);

        disp.innerText = count;
        stat.innerText = words[lang].s;
        stat.style.color = "green";

        // This sends the data to your Make.com Scenario
        fetch(WEBHOOK, { 
            method: 'POST', 
            mode: 'no-cors', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ 
                id: idVal, 
                car: carVal, 
                n: count, 
                time: new Date().toLocaleString() 
            }) 
        });
    }

    function resetQ() {
        if (prompt("PIN?") === PIN) {
            localStorage.clear();
            location.reload();
        }
    }
</script>
</body>
</html>
