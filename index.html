<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Check-In</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; }
        input { margin: 10px; padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background-color: #ccc; }
        #message { margin-top: 20px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h2>MTL Fleet Check-In</h2>
    <input type="text" id="driverId" placeholder="Enter Driver ID" required>
    <input type="text" id="carModel" placeholder="Enter Car Model" required>
    
    <button id="submitBtn" onclick="checkIn()">Check In</button>

    <div id="message"></div>

    <script>
        async function checkIn() {
            const btn = document.getElementById('submitBtn');
            const msg = document.getElementById('message');
            const driverId = document.getElementById('driverId').value;
            const carModel = document.getElementById('carModel').value;

            if (!driverId || !carModel) {
                alert("Please fill in all fields.");
                return;
            }

            // Disable button to prevent double-clicking
            btn.disabled = true;
            msg.innerText = "Processing check-in...";

            try {
                // 1. Get the Driver's IP address from a free API
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                const userIp = ipData.ip;

                // 2. Prepare the data for Make.com
                const payload = {
                    id: driverId,
                    car: carModel,
                    ip: userIp,
                    time: new Date().toLocaleString()
                };

                // 3. Send to Make.com Webhook
                const response = await fetch('YOUR_MAKE_WEBHOOK_URL_HERE', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    msg.style.color = "green";
                    msg.innerText = "Success! You are checked in. Please check the master screen for your position.";
                } else {
                    throw new Error();
                }

            } catch (error) {
                msg.style.color = "red";
                msg.innerText = "Error checking in. Please try again or see the dispatcher.";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
